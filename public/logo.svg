<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B47E2A"/>
      <stop offset="50%" style="stop-color:#C6A554"/>
      <stop offset="100%" style="stop-color:#D3B96B"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D3B96B"/>
      <stop offset="100%" style="stop-color:#B47E2A"/>
    </linearGradient>
  </defs>

  <!-- Kaaba cube body -->
  <rect x="22" y="38" width="50" height="50" rx="2" fill="url(#goldV)"/>

  <!-- Kaaba top face (perspective) -->
  <polygon points="22,38 35,25 85,25 72,38" fill="url(#gold)"/>

  <!-- Kaaba right face -->
  <polygon points="72,38 85,25 85,75 72,88" fill="url(#goldV)" opacity="0.75"/>

  <!-- Kiswa gold band (horizontal stripe on front face) -->
  <rect x="22" y="52" width="50" height="10" fill="#D4AF37" opacity="0.5" rx="1"/>

  <!-- Kiswa Quran calligraphy pattern on band -->
  <rect x="28" y="55" width="16" height="4" rx="2" fill="#B47E2A" opacity="0.6"/>
  <rect x="48" y="55" width="16" height="4" rx="2" fill="#B47E2A" opacity="0.6"/>

  <!-- Maqam Ibrahim circle -->
  <circle cx="88" cy="78" r="4" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- Crescent moon on top of Kaaba -->
  <path d="M47,12 A8,8 0 1,1 47,28 A6,6 0 1,0 47,12" fill="url(#gold)"/>

  <!-- Star next to crescent -->
  <polygon points="58,16 59.5,19.5 63,19.5 60.5,22 61.5,25.5 58,23 54.5,25.5 55.5,22 53,19.5 56.5,19.5" fill="url(#gold)" transform="scale(0.7) translate(22, 4)"/>

  <!-- Text: Alkhaleej -->
  <text x="108" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#1a1a2e" letter-spacing="-0.5">
    Alkhaleej
  </text>

  <!-- Decorative gold line -->
  <line x1="108" y1="58" x2="278" y2="58" stroke="url(#gold)" stroke-width="1.2"/>

  <!-- Text: TRAVELINDO UTAMA -->
  <text x="109" y="74" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#B47E2A" letter-spacing="5">
    TRAVELINDO UTAMA
  </text>

  <!-- Small gold dots decoration -->
  <circle cx="170" cy="88" r="1.5" fill="#B47E2A" opacity="0.4"/>
  <circle cx="180" cy="88" r="1.5" fill="#B47E2A" opacity="0.4"/>
  <circle cx="190" cy="88" r="1.5" fill="#B47E2A" opacity="0.4"/>
</svg>

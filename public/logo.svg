<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B47E2A"/>
      <stop offset="50%" style="stop-color:#C6A554"/>
      <stop offset="100%" style="stop-color:#D3B96B"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D3B96B"/>
      <stop offset="100%" style="stop-color:#B47E2A"/>
    </linearGradient>
  </defs>

  <!-- Mosque dome -->
  <path d="M30 85 C30 45, 70 30, 70 30 C70 30, 110 45, 110 85 Z" fill="url(#gold)" />

  <!-- Crescent moon on top -->
  <circle cx="70" cy="28" r="8" fill="url(#gold2)"/>
  <circle cx="73" cy="26" r="6.5" fill="white"/>

  <!-- Star -->
  <polygon points="70,16 71.5,20 75.5,20 72.5,23 73.5,27 70,24.5 66.5,27 67.5,23 64.5,20 68.5,20" fill="url(#gold2)" transform="translate(0,-4) scale(0.6)" opacity="0"/>

  <!-- Dome pillar left -->
  <rect x="32" y="85" width="8" height="15" rx="1" fill="url(#gold)"/>
  <!-- Dome pillar right -->
  <rect x="100" y="85" width="8" height="15" rx="1" fill="url(#gold)"/>

  <!-- Base -->
  <rect x="25" y="98" width="90" height="4" rx="2" fill="url(#gold2)"/>

  <!-- Door/arch in center -->
  <path d="M62 100 L62 82 C62 72, 78 72, 78 82 L78 100" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Text: Alkhaleej -->
  <text x="140" y="58" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#1a1a2e" letter-spacing="-0.5">
    Alkhaleej
  </text>

  <!-- Text: TRAVELINDO UTAMA -->
  <text x="141" y="78" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#B47E2A" letter-spacing="4">
    TRAVELINDO UTAMA
  </text>

  <!-- Decorative line under text -->
  <line x1="140" y1="84" x2="270" y2="84" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

  <!-- Arabic-style decorative dots -->
  <circle cx="140" cy="94" r="2" fill="#B47E2A" opacity="0.3"/>
  <circle cx="152" cy="94" r="2" fill="#B47E2A" opacity="0.3"/>
  <circle cx="164" cy="94" r="2" fill="#B47E2A" opacity="0.3"/>

  <!-- Haji & Umrah tagline -->
  <text x="175" y="97" font-family="Arial, sans-serif" font-size="8" fill="#888" letter-spacing="2">
    HAJI &amp; UMRAH
  </text>
</svg>
